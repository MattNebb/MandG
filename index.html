<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advent Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="snow" aria-hidden="true"></div>

    <header class="header">
      <p class="header__eyebrow">December magic</p>
      <h1 class="header__title" id="pageTitle">Our Advent Calendar</h1>
      <p class="header__subtitle" id="pageSubtitle">Open one surprise each day</p>
    </header>

    <main class="board" id="board" aria-label="Advent calendar windows"></main>

    <p class="hint" id="hint"></p>

    <div class="lightbox" id="lightbox" hidden>
      <button type="button" class="lightbox__close" id="lightboxClose" aria-label="Close">
        ×
      </button>
      <figure class="lightbox__inner">
        <img class="lightbox__img" id="lightboxImg" alt="" />
        <figcaption class="lightbox__caption" id="lightboxCaption"></figcaption>
      </figure>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
