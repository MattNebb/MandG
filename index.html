<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advent Calendar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="weird-bg" aria-hidden="true">
      <div class="weird-bg__sky"></div>
      <div class="weird-bg__grass"></div>
      <div class="weird-bg__rainbow" aria-hidden="true"></div>
      <div class="weird-bg__jpeg"></div>
      <span class="weird-bg__grain"></span>
    </div>

    <div class="collage" aria-hidden="true">
      <span class="collage__whisper collage__whisper--1">k psadoooo</span>
      <span class="collage__whisper collage__whisper--2">holiiiii</span>
      <span class="collage__whisper collage__whisper--3">pero bueeeeno</span>
      <span class="collage__whisper collage__whisper--4">me enecanta</span>
      <span class="collage__tiny collage__tiny--1">buenaaaaaaaaaaaaa</span>
      <span class="collage__tiny collage__tiny--2">???</span>
      <span class="collage__warn">!!!nobody expects the spanish inquisition!!!</span>
    </div>

    <header class="header">
      <p class="header__eyebrow">
        <span class="header__warn">ATTENZIONE</span>
        <span class="header__warn">ATTENZIONE</span>
        <span class="header__warn">ATTENZIONE</span>
      </p>
      <h1 class="header__title wordart wordart--sunset" id="pageTitle">Our Advent Calendar</h1>
      <p class="header__subtitle wordart wordart--sky" id="pageSubtitle">Open one surprise each day</p>
    </header>

    <main class="board" id="board" aria-label="Advent calendar windows"></main>

    <p class="hint" id="hint"></p>

    <div class="lightbox" id="lightbox" hidden>
      <button type="button" class="lightbox__close" id="lightboxClose" aria-label="Close">
        ×
      </button>
      <figure class="lightbox__inner">
        <img class="lightbox__img" id="lightboxImg" alt="" />
        <figcaption class="lightbox__caption" id="lightboxCaption"></figcaption>
      </figure>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
